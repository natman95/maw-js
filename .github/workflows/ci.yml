name: CI

on:
  push:
    branches: [alpha, main]
  pull_request:
    branches: [alpha, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11  # bumped from 1.3.10 — 1.3.10 can't resolve re-exported getEnvVars; #198 mock.module issue is mitigated (tests are todo)

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build CLI
        run: bun build --target=bun src/cli.ts
