<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>maw — Virtual Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0a0f; }
    ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }

    @keyframes agent-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes blink { 50% { opacity: 0; } }
    @keyframes saiyan-aura {
      0% { r: 28; opacity: 0.4; }
      50% { r: 36; opacity: 0.15; }
      100% { r: 28; opacity: 0.4; }
    }
    @keyframes saiyan-outer {
      0% { r: 38; opacity: 0.2; }
      50% { r: 48; opacity: 0.05; }
      100% { r: 38; opacity: 0.2; }
    }
    @keyframes typing-arm {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes float-code {
      0% { opacity: 0; transform: translateY(0); }
      20% { opacity: 0.7; }
      80% { opacity: 0.7; }
      100% { opacity: 0; transform: translateY(-30px); }
    }
    @keyframes room-pulse {
      0%, 100% { stroke-opacity: 0.2; }
      50% { stroke-opacity: 0.5; }
    }
    @keyframes neon-flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 0.6; }
      20%, 24%, 55% { opacity: 0.3; }
    }
    @keyframes sparkle {
      0% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0); }
    }
    @keyframes scan-line {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
