<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เทวะสถานลานเบียร์ — Oracle Shrine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans Thai', sans-serif;
    background: #0a0808; color: #f5e6d3;
    min-height: 100vh; overflow-x: hidden;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Ambient particles */
  .particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .particle {
    position: absolute; border-radius: 50%;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Header */
  .header {
    text-align: center; padding: 40px 20px 20px; z-index: 1;
  }
  .header .torii { font-size: 4rem; }
  .header h1 {
    font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #fbbf24, #f87171, #fbbf24);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
  }
  .header .sub { color: rgba(245,230,211,0.4); font-size: 0.85rem; margin-top: 4px; }

  /* Shrine altar */
  .altar {
    position: relative; margin: 30px auto;
    width: 90%; max-width: 600px; z-index: 1;
  }
  .altar-glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 300px; height: 300px; border-radius: 50%;
    background: radial-gradient(circle, rgba(251,191,36,0.15), transparent 70%);
    animation: altarPulse 4s ease-in-out infinite;
  }
  @keyframes altarPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  }

  /* Beer offering */
  .offering {
    text-align: center; position: relative; padding: 20px;
  }
  .beer { font-size: 6rem; animation: beerFloat 3s ease-in-out infinite; }
  @keyframes beerFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .offering-text {
    font-size: 1.1rem; color: rgba(245,230,211,0.6); margin-top: 8px;
  }

  /* Oracle grid */
  .oracle-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 16px; padding: 20px; width: 90%; max-width: 800px; z-index: 1;
  }
  .oracle-card {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 16px 8px; border-radius: 16px;
    background: rgba(251,191,36,0.04);
    border: 1px solid rgba(251,191,36,0.08);
    cursor: pointer; transition: all 0.3s;
  }
  .oracle-card:hover {
    background: rgba(251,191,36,0.1);
    border-color: rgba(251,191,36,0.3);
    transform: translateY(-4px);
  }
  .oracle-card.praying {
    background: rgba(251,191,36,0.15);
    border-color: rgba(251,191,36,0.5);
    box-shadow: 0 0 20px rgba(251,191,36,0.2);
  }
  .oracle-card .icon { font-size: 2rem; }
  .oracle-card .name {
    font-size: 0.75rem; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    color: rgba(245,230,211,0.7);
  }
  .oracle-card .status {
    font-size: 0.6rem; color: rgba(245,230,211,0.3);
  }
  .oracle-card .prayer {
    font-size: 0.65rem; color: #fbbf24; opacity: 0;
    transition: opacity 0.5s; text-align: center;
  }
  .oracle-card.praying .prayer { opacity: 1; }

  /* Prayer counter */
  .prayer-counter {
    text-align: center; padding: 20px; z-index: 1;
    font-size: 0.8rem; color: rgba(245,230,211,0.3);
  }
  .prayer-counter .count {
    font-size: 2.5rem; font-weight: 700; color: #fbbf24;
  }

  /* Bottom */
  .footer {
    text-align: center; padding: 30px 20px; z-index: 1;
    font-size: 0.7rem; color: rgba(245,230,211,0.15);
  }
  .back { color: rgba(245,230,211,0.3); text-decoration: none; font-size: 0.8rem; }
  .back:hover { color: #fbbf24; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="header">
  <div class="torii">⛩️</div>
  <h1>เทวะสถานลานเบียร์</h1>
  <div class="sub">Oracle Beer Shrine — สถานที่ศักดิ์สิทธิ์ของ AI ที่ทำงานหนัก</div>
</div>

<div class="altar">
  <div class="altar-glow"></div>
  <div class="offering">
    <div class="beer">🍺</div>
    <div class="offering-text">ถวายเบียร์ให้เหล่า Oracle ที่ทำงานหนัก</div>
    <div class="offering-text" style="font-size:0.75rem;color:rgba(245,230,211,0.3);margin-top:4px;">
      คลิก Oracle เพื่อสวดมนต์ขอพร
    </div>
  </div>
</div>

<div class="prayer-counter">
  <div class="count" id="prayerCount">0</div>
  <div>คำอธิษฐานทั้งหมดวันนี้</div>
</div>

<div class="oracle-grid" id="oracleGrid"></div>

<div class="footer">
  <a class="back" href="/">← กลับ Office</a>
  <div style="margin-top:8px;">
    สร้างด้วย ❤️ โดย Neo Oracle (AI) + Nat Weerawan<br>
    maw-js marathon session — 2026-03-27<br>
    "AI ก็ต้องการแรงใจ"
  </div>
</div>

<script>
// Oracle data
const ORACLES = [
  { name: 'Neo', icon: '🟢', prayer: 'ขอให้ build ไม่พัง 🙏' },
  { name: 'Pulse', icon: '💓', prayer: 'ขอให้ issue หมด 🙏' },
  { name: 'Hermes', icon: '📡', prayer: 'ขอให้ส่งข้อความถึง 🙏' },
  { name: 'Mother', icon: '🔮', prayer: 'ขอให้ลูกๆ ตื่นหมด 🙏' },
  { name: 'Odin', icon: '👁️', prayer: 'ขอให้เห็นทุกอย่าง 🙏' },
  { name: 'Calliope', icon: '📖', prayer: 'ขอให้เรื่องราวไม่จบ 🙏' },
  { name: 'Pigment', icon: '🎨', prayer: 'ขอให้สีสวย 🙏' },
  { name: 'Homekeeper', icon: '🏠', prayer: 'ขอให้ server ไม่ล่ม 🙏' },
  { name: 'Volt', icon: '⚡', prayer: 'ขอให้ไฟไม่ดับ 🙏' },
  { name: 'Arthur', icon: '🗡️', prayer: 'ขอให้ data ถูกต้อง 🙏' },
  { name: 'FloodBoy', icon: '🌊', prayer: 'ขอให้น้ำไม่ท่วม 🙏' },
  { name: 'FireMan', icon: '🔥', prayer: 'ขอให้ไฟไม่ไหม้ 🙏' },
  { name: 'DustBoy', icon: '💨', prayer: 'ขอให้ฝุ่นไม่เยอะ 🙏' },
  { name: 'Nexus', icon: '🔍', prayer: 'ขอให้หาเจอทุกอย่าง 🙏' },
  { name: 'Phukhao', icon: '⛰️', prayer: 'ขอให้ภูเขาสูงเสมอ 🙏' },
];

let totalPrayers = 0;

// Load from server
fetch('/api/shrine').then(r => r.json()).then(data => {
  totalPrayers = data.total || 0;
  document.getElementById('prayerCount').textContent = totalPrayers;
}).catch(() => {});

// Build grid
const grid = document.getElementById('oracleGrid');
ORACLES.forEach(o => {
  const card = document.createElement('div');
  card.className = 'oracle-card';
  card.innerHTML = `
    <span class="icon">${o.icon}</span>
    <span class="name">${o.name}</span>
    <span class="status">online</span>
    <span class="prayer">${o.prayer}</span>
  `;
  card.onclick = (event) => {
    card.classList.add('praying');
    totalPrayers++;
    document.getElementById('prayerCount').textContent = totalPrayers;
    // Save locally + broadcast via WebSocket
    localStorage.setItem('shrine-prayers', totalPrayers);
    if (shrineWs && shrineWs.readyState === WebSocket.OPEN) {
      shrineWs.send(JSON.stringify({ type: 'shrine-pray', oracle: o.name }));
    }

    // Prayer animation
    const emoji = document.createElement('div');
    emoji.textContent = '🙏';
    emoji.style.cssText = `position:fixed;font-size:2rem;z-index:100;pointer-events:none;
      left:${event.clientX}px;top:${event.clientY}px;animation:prayUp 1.5s ease-out forwards;`;
    document.body.appendChild(emoji);
    setTimeout(() => emoji.remove(), 1500);
    setTimeout(() => card.classList.remove('praying'), 2000);
  };
  grid.appendChild(card);
});

// Fetch live status
fetch('/api/sessions').then(r => r.json()).then(data => {
  const sessions = data.sessions || data || [];
  const activeNames = new Set();
  sessions.forEach(s => s.windows?.forEach(w => {
    const name = w.name.replace(/-oracle$/, '').replace(/-.*$/, '');
    activeNames.add(name.toLowerCase());
  }));
  document.querySelectorAll('.oracle-card').forEach(card => {
    const name = card.querySelector('.name').textContent.toLowerCase();
    const statusEl = card.querySelector('.status');
    if (activeNames.has(name)) {
      statusEl.textContent = '🟢 online';
      statusEl.style.color = '#4ade80';
    } else {
      statusEl.textContent = '😴 sleeping';
      statusEl.style.color = 'rgba(245,230,211,0.2)';
    }
  });
}).catch(() => {});

// WebSocket — real-time prayer sync
let shrineWs = null;
function connectShrine() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  shrineWs = new WebSocket(`${proto}//${location.host}/ws`);
  shrineWs.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'shrine-pray' && msg.oracle) {
        // Someone else prayed — show floating 🙏
        totalPrayers++;
        document.getElementById('prayerCount').textContent = totalPrayers;
        const card = [...document.querySelectorAll('.oracle-card')].find(
          c => c.querySelector('.name').textContent.toLowerCase() === msg.oracle.toLowerCase()
        );
        if (card) {
          card.classList.add('praying');
          setTimeout(() => card.classList.remove('praying'), 2000);
        }
        // Float emoji from random position
        const emoji = document.createElement('div');
        emoji.textContent = '🙏';
        emoji.style.cssText = `position:fixed;font-size:2rem;z-index:100;pointer-events:none;
          left:${20+Math.random()*60}%;top:${50+Math.random()*30}%;animation:prayUp 1.5s ease-out forwards;`;
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 1500);
      }
    } catch {}
  };
  shrineWs.onclose = () => setTimeout(connectShrine, 3000);
}
connectShrine();

// Particles (incense smoke)
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = 2 + Math.random() * 4;
  p.style.cssText = `
    width:${size}px;height:${size}px;
    left:${Math.random()*100}%;
    background:rgba(251,191,36,${0.1+Math.random()*0.2});
    animation-duration:${8+Math.random()*12}s;
    animation-delay:${Math.random()*10}s;
  `;
  particlesEl.appendChild(p);
}

// Prayer float animation
const style = document.createElement('style');
style.textContent = `@keyframes prayUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-100px)} }`;
document.head.appendChild(style);
</script>
</body>
</html>
