<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Time Machine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  *::-webkit-scrollbar { display: none; }
  body {
    background: #000;
    color: #e0e0e0;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    height: 100vh;
    perspective: 1200px;
  }

  /* Starfield background */
  .stars {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;
    background: radial-gradient(ellipse at 50% 100%, #0a0a2e 0%, #000 70%);
  }
  .stars::before, .stars::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 70%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 55%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.4) 0%, transparent 100%);
  }
  .stars::after {
    background-image:
      radial-gradient(1.5px 1.5px at 5% 90%, rgba(100,181,246,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 5%, rgba(100,181,246,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 50%, rgba(255,213,79,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 95%, rgba(100,181,246,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 75% 75%, rgba(255,255,255,0.6) 0%, transparent 100%);
  }

  /* Card stack area */
  .stack-container {
    position: relative; z-index: 1;
    width: 100%; height: calc(100vh - 80px);
    display: flex; align-items: center; justify-content: center;
    padding-top: 60px; padding-bottom: 60px;
  }

  .card-stack {
    position: relative;
    width: min(92vw, 1400px);
    height: min(65vh, 600px);
  }

  .card {
    position: absolute;
    width: 100%;
    background: rgba(20, 20, 35, 0.92);
    border: 1px solid rgba(100, 181, 246, 0.2);
    border-radius: 12px;
    padding: 20px 24px;
    backdrop-filter: blur(8px);
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5);
  }
  .card.active {
    border-color: rgba(100, 181, 246, 0.6);
    box-shadow: 0 0 40px rgba(100, 181, 246, 0.15), 0 4px 32px rgba(0,0,0,0.5);
  }

  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 12px;
  }
  .card-date { color: #64b5f6; font-size: 1.1em; font-weight: 600; }
  .card-trigger {
    padding: 3px 10px; border-radius: 12px; font-size: 0.75em; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .card-trigger.wake { color: #4caf50; background: rgba(76,175,80,0.15); }
  .card-trigger.sleep { color: #ff9800; background: rgba(255,152,0,0.15); }
  .card-trigger.done { color: #f44336; background: rgba(244,67,54,0.15); }
  .card-trigger.manual { color: #64b5f6; background: rgba(100,181,246,0.15); }

  .card-stats { color: #666; font-size: 0.8em; margin-bottom: 12px; }

  .sessions-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 6px;
    max-height: calc(65vh - 80px); overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none;
  }
  .session-pill {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 8px 12px;
  }
  .session-pill-name { color: #ffd54f; font-size: 0.8em; font-weight: 600; margin-bottom: 4px; }
  .session-pill-windows { color: #666; font-size: 0.7em; line-height: 1.5; }
  .window-tag-inline { display: inline; }
  .window-tag-inline.added { color: #4caf50; animation: tagPulse 0.6s ease-out; }
  .window-tag-inline.removed { color: #f44336; text-decoration: line-through; opacity: 0.6; animation: tagFadeOut 0.6s ease-out; }
  .session-pill.added { border-color: rgba(76,175,80,0.4); animation: pillSlideIn 0.5s ease-out; }
  .session-pill.removed { border-color: rgba(244,67,54,0.3); opacity: 0.4; animation: pillFadeOut 0.5s ease-out; }

  @keyframes tagPulse { from { color: #81c784; transform: scale(1.1); } to { color: #4caf50; transform: scale(1); } }
  @keyframes tagFadeOut { from { opacity: 1; } to { opacity: 0.6; } }
  @keyframes pillSlideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes pillFadeOut { from { opacity: 0.8; } to { opacity: 0.4; } }

  /* Timeline sidebar */
  .timeline {
    position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
    z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .tl-tick {
    width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15);
    cursor: pointer; transition: width 0.15s, height 0.15s, background 0.15s, margin 0.15s;
    position: relative; flex-shrink: 0;
  }
  .tl-tick.active { background: #64b5f6; width: 12px; height: 12px; box-shadow: 0 0 8px rgba(100,181,246,0.5); }
  .tl-tick .tl-label {
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    white-space: nowrap; color: #666; font-size: 0.7em; opacity: 0; transition: opacity 0.15s; pointer-events: none;
  }
  .tl-tick.active .tl-label { opacity: 1; color: #aaa; }
  .tl-tick.mag-1 { width: 14px; height: 14px; background: rgba(100,181,246,0.6); }
  .tl-tick.mag-1 .tl-label { opacity: 1; color: #ccc; }
  .tl-tick.mag-2 { width: 10px; height: 10px; background: rgba(100,181,246,0.35); }
  .tl-tick.mag-3 { width: 8px; height: 8px; background: rgba(255,255,255,0.25); }

  /* Header */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    padding: 16px 24px; display: flex; align-items: baseline; gap: 12px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
  }
  .header h1 { color: #64b5f6; font-size: 1.2em; font-weight: 600; }
  .header .sub { color: #555; font-size: 0.8em; }
  .header .node { color: #ffd54f; font-size: 0.8em; }

  /* Bottom bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    padding: 12px 24px; text-align: center;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    color: #555; font-size: 0.75em;
  }

  /* Scroll arrows */
  .nav-arrows {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 16px;
  }
  .nav-btn {
    background: rgba(100,181,246,0.1); border: 1px solid rgba(100,181,246,0.3);
    color: #64b5f6; border-radius: 50%; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 1.2em; transition: all 0.2s;
  }
  .nav-btn:hover { background: rgba(100,181,246,0.25); }

  /* Session selector */
  .selector {
    position: fixed; top: 48px; left: 0; right: 60px; z-index: 15;
    padding: 8px 24px; display: flex; gap: 6px; flex-wrap: wrap;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%);
  }
  .sel-btn {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    color: #888; padding: 4px 12px; border-radius: 16px; font-size: 0.72em;
    cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .sel-btn:hover { border-color: rgba(100,181,246,0.4); color: #aaa; }
  .sel-btn.active { background: rgba(100,181,246,0.15); border-color: #64b5f6; color: #64b5f6; }

  .card-stack.navigating-up .card { animation: flyFromPast 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
  .card-stack.navigating-down .card { animation: flyFromFuture 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

  @keyframes flyFromPast {
    from { opacity: 0; transform: translateY(-120px) scale(0.8) perspective(800px) rotateX(8deg); }
    to { opacity: 1; }
  }
  @keyframes flyFromFuture {
    from { opacity: 0; transform: translateY(80px) scale(1.05); }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="stars"></div>

<div class="header">
  <h1>Fleet Time Machine</h1>
  <span class="node" id="node-name">...</span>
  <span class="sub" id="count"></span>
</div>

<div class="selector" id="selector"></div>

<div class="stack-container">
  <div class="card-stack" id="card-stack"></div>
</div>

<div class="timeline" id="timeline"></div>

<div class="nav-arrows">
  <div class="nav-btn" onclick="showIndex(0)" title="Latest" style="font-size:0.7em">NOW</div>
  <div class="nav-btn" onclick="navigate(-1)">&#9650;</div>
  <div class="nav-btn" onclick="navigate(1)">&#9660;</div>
</div>

<div class="bottom-bar">
  scroll or use arrows to travel through time
</div>

<script>
const API = location.origin;
let allSnaps = [];
let allDetails = {};
let currentIndex = 0;
let selectedSession = null; // null = all

fetch(`${API}/api/auth/status`).then(r => r.json()).then(d => {
  document.getElementById('node-name').textContent = d.node || location.hostname;
}).catch(() => {});

async function load() {
  allSnaps = await fetch(`${API}/api/snapshots`).then(r => r.json());
  document.getElementById('count').textContent = `${allSnaps.length} snapshots`;
  if (allSnaps.length === 0) return;

  // Preload all snapshot details
  await Promise.all(allSnaps.map(async (s) => {
    const data = await fetch(`${API}/api/snapshots/${s.file}`).then(r => r.json());
    allDetails[s.file] = data;
  }));

  renderSelector();
  renderTimeline();
  showIndex(0);
}

function renderSelector() {
  // Collect all unique session names across all snapshots
  const names = new Set();
  for (const s of allSnaps) {
    const data = allDetails[s.file];
    if (data) data.sessions.forEach(sess => names.add(sess.name));
  }
  const sorted = [...names].sort();
  const sel = document.getElementById('selector');
  sel.innerHTML = `<div class="sel-btn active" onclick="selectSession(null, this)">All</div>` +
    sorted.map(n => `<div class="sel-btn" onclick="selectSession('${n}', this)">${n}</div>`).join('');
}

function selectSession(name, el) {
  selectedSession = name;
  document.querySelectorAll('.sel-btn').forEach(b => b.classList.remove('active'));
  if (el) el.classList.add('active');
  showIndex(currentIndex);
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // Reverse: oldest at top, newest at bottom (like macOS Time Machine)
  const reversed = [...allSnaps].reverse();
  tl.innerHTML = reversed.map((s, ri) => {
    const i = allSnaps.length - 1 - ri; // map back to original index
    const d = new Date(s.timestamp);
    const label = `${d.toLocaleDateString('en-GB')} ${days[d.getDay()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="tl-tick${i === 0 ? ' active' : ''}" data-index="${i}" onclick="showIndex(${i})"><span class="tl-label">${label}</span></div>`;
  }).join('');
}

function showIndex(idx) {
  if (idx < 0 || idx >= allSnaps.length) return;
  currentIndex = idx;

  // Update timeline (reversed: bottom = newest)
  document.querySelectorAll('.tl-tick').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.index) === idx);
  });

  // Render card stack (show current + 4 behind)
  const stack = document.getElementById('card-stack');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = '';

  for (let offset = Math.min(4, allSnaps.length - idx - 1); offset >= 0; offset--) {
    const i = idx + offset;
    const s = allSnaps[i];
    const data = allDetails[s.file];
    if (!data) continue;

    const filtered = selectedSession
      ? data.sessions.filter(sess => sess.name === selectedSession)
      : data.sessions;

    // Compute diff with next snapshot (older one)
    const nextSnap = allSnaps[i + 1] ? allDetails[allSnaps[i + 1].file] : null;
    const prevWindows = new Set();
    const prevSessions = new Set();
    if (nextSnap) {
      const nf = selectedSession ? nextSnap.sessions.filter(s => s.name === selectedSession) : nextSnap.sessions;
      nf.forEach(s => { prevSessions.add(s.name); s.windows.forEach(w => prevWindows.add(s.name + ':' + w.name)); });
    }
    const currWindows = new Set();
    const currSessions = new Set();
    filtered.forEach(s => { currSessions.add(s.name); s.windows.forEach(w => currWindows.add(s.name + ':' + w.name)); });

    // Sessions that existed before but not now
    const removedSessions = nextSnap ? [...prevSessions].filter(s => !currSessions.has(s)) : [];
    const removedSessionsData = removedSessions.map(name => {
      const nf = selectedSession ? nextSnap.sessions.filter(s => s.name === selectedSession) : nextSnap.sessions;
      return nf.find(s => s.name === name);
    }).filter(Boolean);

    const d = new Date(s.timestamp);
    const dateStr = `${d.toLocaleDateString('en-GB')} ${days[d.getDay()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const isActive = offset === 0;

    const scale = 1 - offset * 0.05;
    const translateY = -offset * 35;
    const opacity = 1 - offset * 0.2;
    const blur = offset > 0 ? `filter: blur(${offset}px);` : '';

    html += `<div class="card${isActive ? ' active' : ''}" style="
      transform: translateY(${translateY}px) scale(${scale});
      opacity: ${opacity}; z-index: ${10 - offset}; ${blur}
    " onclick="showIndex(${i})">
      <div class="card-header">
        <div class="card-date">${dateStr}</div>
        <div class="card-trigger ${s.trigger}">${s.trigger}</div>
      </div>
      <div class="card-stats">${filtered.length} sessions, ${filtered.reduce((a,s) => a + s.windows.length, 0)} windows</div>
      <div class="sessions-grid">
        ${filtered.map(sess => {
          const isNewSession = isActive && nextSnap && !prevSessions.has(sess.name);
          return `<div class="session-pill${isNewSession ? ' added' : ''}">
            <div class="session-pill-name">${sess.name}${isNewSession ? ' <span style="color:#4caf50;font-size:0.8em">NEW</span>' : ''}</div>
            <div class="session-pill-windows">${sess.windows.map(w => {
              const key = sess.name + ':' + w.name;
              const isNew = isActive && nextSnap && !prevWindows.has(key);
              return `<span class="window-tag-inline${isNew ? ' added' : ''}">${w.name}</span>`;
            }).join(', ')}</div>
          </div>`;
        }).join('')}
        ${isActive ? removedSessionsData.map(sess => `
          <div class="session-pill removed">
            <div class="session-pill-name">${sess.name} <span style="color:#f44336;font-size:0.8em">GONE</span></div>
            <div class="session-pill-windows">${sess.windows.map(w => `<span class="window-tag-inline removed">${w.name}</span>`).join(', ')}</div>
          </div>
        `).join('') : ''}
      </div>
    </div>`;
  }

  stack.innerHTML = html;
}

function navigate(dir) {
  const stack = document.getElementById('card-stack');
  stack.classList.remove('navigating-up', 'navigating-down');
  void stack.offsetWidth; // force reflow
  stack.classList.add(dir < 0 ? 'navigating-up' : 'navigating-down');
  showIndex(currentIndex + dir);
}

// Mouse wheel navigation
document.addEventListener('wheel', (e) => {
  if (e.deltaY > 0) navigate(1);
  else if (e.deltaY < 0) navigate(-1);
}, { passive: true });

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') navigate(1);
});

// Fisheye magnifier on timeline
const timeline = document.getElementById('timeline');
timeline.addEventListener('mousemove', (e) => {
  const ticks = timeline.querySelectorAll('.tl-tick');
  ticks.forEach(tick => {
    const rect = tick.getBoundingClientRect();
    const tickCenter = rect.top + rect.height / 2;
    const dist = Math.abs(e.clientY - tickCenter);
    tick.classList.remove('mag-1', 'mag-2', 'mag-3');
    if (dist < 15) tick.classList.add('mag-1');
    else if (dist < 35) tick.classList.add('mag-2');
    else if (dist < 55) tick.classList.add('mag-3');
  });
});
timeline.addEventListener('mouseleave', () => {
  timeline.querySelectorAll('.tl-tick').forEach(t => t.classList.remove('mag-1', 'mag-2', 'mag-3'));
});

load();
</script>
</body>
</html>
