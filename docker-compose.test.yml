# Mirrors .github/workflows/ci.yml — reproduces each matrix suite locally.
# CI uses ubuntu-latest + bun install --frozen-lockfile. We use oven/bun:1-debian
# (Debian bookworm + bun prebuilt) which is the closest public parity to GHA's runner.
#
# Usage:
#   docker compose -f docker-compose.test.yml run --rm ci-unit
#   docker compose -f docker-compose.test.yml run --rm ci-isolated   # reproduces the 14 failures
#   docker compose -f docker-compose.test.yml run --rm ci-plugin
#   docker compose -f docker-compose.test.yml run --rm ci-mock-smoke
#   docker compose -f docker-compose.test.yml run --rm ci-all        # all 4 sequentially (like CI matrix)
#   docker compose -f docker-compose.test.yml run --rm ci-shell      # interactive bash inside the CI env
#
# Fresh-install semantics match CI: each service does `bun install --frozen-lockfile` in /app
# before running tests. Host node_modules is NOT mounted.

x-ci-base: &ci-base
  image: oven/bun:1-debian
  working_dir: /app
  volumes:
    # read-only source (no host node_modules leak)
    - type: bind
      source: .
      target: /src
      read_only: true
    # tmpfs /app — fresh install every run, mirroring CI's clean checkout
    - type: tmpfs
      target: /app
    - bun-cache:/root/.bun/install/cache
  environment:
    - CI=true
    - GITHUB_ACTIONS=true
    - TZ=UTC
  entrypoint:
    - bash
    - -c

services:
  # ---- CI matrix replicas ----

  ci-unit:
    <<: *ci-base
    command:
      - |
        set -euxo pipefail
        cp -a /src/. /app/
        bun install --frozen-lockfile
        bun build --target=bun src/cli.ts
        bun run test

  ci-isolated:
    <<: *ci-base
    command:
      - |
        set -euxo pipefail
        cp -a /src/. /app/
        bun install --frozen-lockfile
        bun run test:isolated

  ci-plugin:
    <<: *ci-base
    command:
      - |
        set -euxo pipefail
        cp -a /src/. /app/
        bun install --frozen-lockfile
        bun run test:plugin

  ci-mock-smoke:
    <<: *ci-base
    command:
      - |
        set -euxo pipefail
        cp -a /src/. /app/
        bun install --frozen-lockfile
        bun run test:mock-smoke

  # ---- Full CI matrix sequentially ----

  ci-all:
    <<: *ci-base
    command:
      - |
        set -euxo pipefail
        cp -a /src/. /app/
        bun install --frozen-lockfile
        bun build --target=bun src/cli.ts
        echo "===[1/4 unit]==="       && bun run test
        echo "===[2/4 isolated]===" && bun run test:isolated
        echo "===[3/4 plugin]==="   && bun run test:plugin
        echo "===[4/4 mock-smoke]===" && bun run test:mock-smoke

  # ---- Manifest + structure validator (the CI steps after install) ----

  ci-validate:
    <<: *ci-base
    command:
      - |
        set -euxo pipefail
        cp -a /src/. /app/
        bun install --frozen-lockfile
        echo "--- manifest validation ---"
        fail=0
        for f in src/commands/plugins/*/plugin.json; do
          if ! bun -e "JSON.parse(require('fs').readFileSync('$$f','utf-8'))" 2>/dev/null; then
            echo "✗ $$(basename $$(dirname $$f))"; fail=1
          fi
        done
        echo "✓ $$(ls src/commands/plugins/*/plugin.json | wc -l) manifests valid"
        [ $$fail -eq 0 ]
        echo "--- structure ---"
        root=$$(ls src/*.ts 2>/dev/null | wc -l)
        cmd=$$(ls src/commands/*.ts 2>/dev/null | wc -l)
        echo "src/ root: $$root (expect ≤2) | commands/ root: $$cmd (expect 0)"
        [ "$$root" -le 2 ] && [ "$$cmd" -eq 0 ]

  # ---- Interactive shell inside the CI env ----

  ci-shell:
    <<: *ci-base
    volumes:
      - type: bind
        source: .
        target: /app
      - bun-cache:/root/.bun/install/cache
    command:
      - |
        echo "CI env — bun $$(bun --version), node $$(node --version 2>/dev/null || echo 'N/A')"
        echo "TZ=$$TZ  CI=$$CI  GITHUB_ACTIONS=$$GITHUB_ACTIONS"
        exec bash
    stdin_open: true
    tty: true

volumes:
  bun-cache:
