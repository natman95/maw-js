<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sessions — maw-js Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif; padding: 2rem; max-width: 800px; margin: 0 auto; }
  h1 { color: #64b5f6; margin-bottom: 0.25rem; font-size: 1.3rem; }
  .sub { color: #666; margin-bottom: 1.5rem; font-size: 0.85rem; }
  .session { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
  .session-name { color: #4fc3f7; font-weight: 600; }
  .source { color: #666; font-size: 0.8rem; margin-left: 0.5rem; }
  .window { padding: 0.25rem 0 0.25rem 1rem; font-size: 0.9rem; }
  .window .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.active { background: #4caf50; }
  .dot.inactive { background: #555; }
  .meta { color: #666; font-size: 0.8rem; margin-top: 1rem; }
  a { color: #64b5f6; }
</style>
</head>
<body>
  <h1>Sessions</h1>
  <p class="sub">GET /api/sessions — live tmux sessions + federation peers</p>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@19'
    import { createRoot } from 'https://esm.sh/react-dom@19/client'
    import htm from 'https://esm.sh/htm@3'
    const html = htm.bind(React.createElement)

    const API = location.origin

    function App() {
      const [sessions, setSessions] = useState([])
      const [error, setError] = useState(null)
      const [lastFetch, setLastFetch] = useState(null)

      useEffect(() => {
        async function load() {
          try {
            const res = await fetch(API + '/api/sessions')
            const data = await res.json()
            setSessions(Array.isArray(data) ? data : data.sessions || [])
            setLastFetch(new Date().toLocaleTimeString())
          } catch (e) { setError(e.message) }
        }
        load()
        const t = setInterval(load, 5000)
        return () => clearInterval(t)
      }, [])

      if (error) return html`<p style=${{ color: '#f44336' }}>Error: ${error}</p>`

      return html`
        <div>
          ${sessions.map(s => html`
            <div class="session" key=${s.name}>
              <span class="session-name">${s.name}</span>
              <span class="source">${s.source || 'local'}</span>
              <span class="source">(${(s.windows || []).length} windows)</span>
              ${(s.windows || []).map(w => html`
                <div class="window" key=${w.name}>
                  <span class="dot ${w.active ? 'active' : 'inactive'}"></span>
                  ${w.index}: ${w.name}
                </div>
              `)}
            </div>
          `)}
          <p class="meta">${sessions.length} sessions · last: ${lastFetch} · <a href="index.html">← back</a></p>
        </div>
      `
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
