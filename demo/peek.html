<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peek — maw-js Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif; padding: 2rem; max-width: 900px; margin: 0 auto; }
  h1 { color: #64b5f6; margin-bottom: 0.25rem; font-size: 1.3rem; }
  .sub { color: #666; margin-bottom: 1rem; font-size: 0.85rem; }
  .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .controls select, .controls button { background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; cursor: pointer; }
  .controls button { background: #1e3a5f; color: #64b5f6; border-color: #64b5f6; }
  .controls button:hover { background: #264d73; }
  .controls button.auto.on { background: #1b3a1b; color: #4caf50; border-color: #4caf50; }
  .terminal { background: #000; border: 1px solid #333; border-radius: 8px; padding: 0.75rem; font-family: 'Cascadia Code', 'Fira Code', 'Menlo', monospace; font-size: 0.8rem; line-height: 1.3; white-space: pre; overflow-x: auto; min-height: 200px; color: #ccc; }
  .meta { color: #666; font-size: 0.8rem; margin-top: 1rem; }
  a { color: #64b5f6; }
  .empty { color: #555; font-style: italic; }
</style>
</head>
<body>
  <h1>Peek</h1>
  <p class="sub">GET /api/capture?target=... — terminal screen capture</p>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'https://esm.sh/react@19'
    import { createRoot } from 'https://esm.sh/react-dom@19/client'
    import htm from 'https://esm.sh/htm@3'
    const html = htm.bind(React.createElement)

    const API = location.origin

    function App() {
      const [agents, setAgents] = useState([])
      const [target, setTarget] = useState('')
      const [content, setContent] = useState('')
      const [error, setError] = useState(null)
      const [auto, setAuto] = useState(false)
      const [lastFetch, setLastFetch] = useState(null)
      const timerRef = useRef(null)

      useEffect(() => {
        async function load() {
          try {
            const res = await fetch(API + '/api/sessions')
            const data = await res.json()
            const sessions = Array.isArray(data) ? data : data.sessions || []
            const list = sessions.flatMap(s =>
              (s.windows || []).map(w => `${s.name}:${w.name}`)
            )
            setAgents(list)
            if (!target && list.length) setTarget(list[0])
          } catch {}
        }
        load()
      }, [])

      const doCapture = useCallback(async () => {
        if (!target) return
        try {
          const res = await fetch(API + '/api/capture?target=' + encodeURIComponent(target))
          const data = await res.json()
          if (data.error) { setError(data.error); setContent('') }
          else { setContent(data.content || ''); setError(null) }
          setLastFetch(new Date().toLocaleTimeString())
        } catch (e) { setError(e.message) }
      }, [target])

      useEffect(() => {
        if (auto && target) {
          doCapture()
          timerRef.current = setInterval(doCapture, 2000)
          return () => clearInterval(timerRef.current)
        }
        return () => clearInterval(timerRef.current)
      }, [auto, target, doCapture])

      return html`
        <div>
          <div class="controls">
            <select value=${target} onChange=${e => setTarget(e.target.value)}>
              ${agents.map(a => html`<option key=${a} value=${a}>${a}</option>`)}
            </select>
            <button onClick=${doCapture}>Capture</button>
            <button class="auto ${auto ? 'on' : ''}" onClick=${() => setAuto(!auto)}>
              ${auto ? '● Auto (2s)' : '○ Auto'}
            </button>
          </div>
          ${error ? html`<p style=${{ color: '#f44336', marginBottom: '0.5rem', fontSize: '0.85rem' }}>Error: ${error}</p>` : null}
          <div class="terminal">${content || html`<span class="empty">Select a target and click Capture</span>`}</div>
          <p class="meta">${lastFetch ? `Last: ${lastFetch}` : ''} · <a href="index.html">← back</a></p>
        </div>
      `
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
