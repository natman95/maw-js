<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send — maw-js Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: system-ui, sans-serif; padding: 2rem; max-width: 700px; margin: 0 auto; }
  h1 { color: #64b5f6; margin-bottom: 0.25rem; font-size: 1.3rem; }
  .sub { color: #666; margin-bottom: 1rem; font-size: 0.85rem; }
  .form { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
  .row { display: flex; gap: 0.5rem; }
  select, input, button { background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.9rem; }
  input { flex: 1; }
  button { background: #1e3a5f; color: #64b5f6; border-color: #64b5f6; cursor: pointer; white-space: nowrap; }
  button:hover { background: #264d73; }
  button:disabled { opacity: 0.5; cursor: default; }
  .result { background: #1a1a2e; border: 1px solid #333; border-radius: 8px; padding: 0.75rem; margin-bottom: 0.5rem; font-size: 0.85rem; }
  .result.ok { border-color: #4caf50; }
  .result.err { border-color: #f44336; }
  .result .label { font-weight: 600; margin-bottom: 0.25rem; }
  .result .target { color: #4fc3f7; }
  .result .lastLine { color: #888; font-family: monospace; font-size: 0.8rem; margin-top: 0.25rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result .source { color: #666; font-size: 0.8rem; }
  .history-title { color: #666; font-size: 0.8rem; margin-bottom: 0.5rem; }
  .meta { color: #666; font-size: 0.8rem; margin-top: 1rem; }
  a { color: #64b5f6; }
</style>
</head>
<body>
  <h1>Send</h1>
  <p class="sub">POST /api/send — send message to agent with delivery confirmation</p>
  <div id="root"></div>
  <script type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@19'
    import { createRoot } from 'https://esm.sh/react-dom@19/client'
    import htm from 'https://esm.sh/htm@3'
    const html = htm.bind(React.createElement)

    const API = location.origin

    function App() {
      const [agents, setAgents] = useState([])
      const [target, setTarget] = useState('')
      const [message, setMessage] = useState('')
      const [sending, setSending] = useState(false)
      const [history, setHistory] = useState([])
      const inputRef = useRef(null)

      useEffect(() => {
        async function load() {
          try {
            const res = await fetch(API + '/api/sessions')
            const data = await res.json()
            const sessions = Array.isArray(data) ? data : data.sessions || []
            const list = sessions.flatMap(s =>
              (s.windows || []).map(w => w.name)
            )
            setAgents([...new Set(list)])
            if (!target && list.length) setTarget(list[0])
          } catch {}
        }
        load()
      }, [])

      async function doSend() {
        if (!target || !message.trim() || sending) return
        setSending(true)
        const ts = new Date().toLocaleTimeString()
        try {
          const res = await fetch(API + '/api/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ target, text: message.trim() }),
          })
          const data = await res.json()
          if (data.ok) {
            setHistory(prev => [{ ts, ok: true, target: data.target, text: message.trim(), source: data.source, lastLine: data.lastLine }, ...prev].slice(0, 20))
          } else {
            setHistory(prev => [{ ts, ok: false, error: data.error || 'unknown error', target, text: message.trim() }, ...prev].slice(0, 20))
          }
          setMessage('')
          inputRef.current?.focus()
        } catch (e) {
          setHistory(prev => [{ ts, ok: false, error: e.message, target, text: message.trim() }, ...prev].slice(0, 20))
        }
        setSending(false)
      }

      function onKey(e) {
        if (e.key === 'Enter') doSend()
      }

      return html`
        <div>
          <div class="form">
            <div class="row">
              <select value=${target} onChange=${e => setTarget(e.target.value)}>
                ${agents.map(a => html`<option key=${a} value=${a}>${a}</option>`)}
              </select>
              <input ref=${inputRef} value=${message} onChange=${e => setMessage(e.target.value)} onKeyDown=${onKey} placeholder="Message..." />
              <button onClick=${doSend} disabled=${sending || !message.trim()}>
                ${sending ? 'Sending...' : 'Send'}
              </button>
            </div>
          </div>
          ${history.length > 0 ? html`<div class="history-title">${history.length} messages</div>` : null}
          ${history.map((h, i) => html`
            <div class="result ${h.ok ? 'ok' : 'err'}" key=${i}>
              <div class="label">
                ${h.ok ? '✓ delivered' : '✗ failed'}
                ${' → '}
                <span class="target">${h.target || target}</span>
                <span class="source"> · ${h.source || ''} · ${h.ts}</span>
              </div>
              <div style=${{ color: '#aaa' }}>${h.text}</div>
              ${h.lastLine ? html`<div class="lastLine">⤷ ${h.lastLine}</div>` : null}
              ${h.error ? html`<div style=${{ color: '#f44336', fontSize: '0.8rem' }}>${h.error}</div>` : null}
            </div>
          `)}
          <p class="meta"><a href="index.html">← back</a></p>
        </div>
      `
    }

    createRoot(document.getElementById('root')).render(html`<${App} />`)
  </script>
</body>
</html>
