set -g default-shell /usr/bin/zsh
set -g default-command "zsh -l"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# OSC 8 hyperlinks (tmux 3.4+)
set -g allow-passthrough on
set -ga terminal-features "xterm-256color:hyperlinks:osc7"

# Mouse support
set -g mouse on

# Click to select window/pane (MAW style)
bind -n MouseDown1Pane select-pane -t=
bind -n MouseDown1Status select-window -t=
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n MouseDrag1Border resize-pane -M
bind -n MouseDown3Pane paste-buffer

# Style
set -g pane-active-border-style "fg=colour39"
set -g status-style "bg=colour234 fg=colour39"
setw -g window-status-current-style "fg=colour255 bg=colour22 bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# Auto-close dead panes (agent teammates exit cleanly)
set-hook -g pane-died 'kill-pane'

# Vi copy mode
setw -g mode-keys vi
set -g history-limit 10000
set -sg escape-time 0
set -g base-index 1

# Quick window nav (no prefix needed)
bind -n M-Left previous-window
bind -n M-Right next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Propagate window name to terminal title (WezTerm tab detection)
set-option -g set-titles on
set-option -g set-titles-string "#W"
